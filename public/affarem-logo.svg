<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024" role="img" aria-labelledby="title desc">
  <title id="title">AFFAREM logo</title>
  <desc id="desc">AFFAREM Invest Manage Grow logo with a gold growth arrow and silver wordmark on black.</desc>
  <defs>
    <radialGradient id="backgroundGlow" cx="50%" cy="48%" r="58%">
      <stop offset="0%" stop-color="#3d3a2b"/>
      <stop offset="42%" stop-color="#101010"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>
    <radialGradient id="goldHalo" cx="53%" cy="39%" r="38%">
      <stop offset="0%" stop-color="#fff4a6" stop-opacity="0.92"/>
      <stop offset="32%" stop-color="#d5a72a" stop-opacity="0.42"/>
      <stop offset="100%" stop-color="#d5a72a" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="gold" x1="0%" x2="100%" y1="0%" y2="100%">
      <stop offset="0%" stop-color="#fff3a6"/>
      <stop offset="32%" stop-color="#e0b744"/>
      <stop offset="63%" stop-color="#b78212"/>
      <stop offset="100%" stop-color="#f3d46d"/>
    </linearGradient>
    <linearGradient id="silver" x1="0%" x2="100%" y1="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="36%" stop-color="#d8d8d8"/>
      <stop offset="66%" stop-color="#9b9b9b"/>
      <stop offset="100%" stop-color="#f6f6f6"/>
    </linearGradient>
    <filter id="softGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="22" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="1 0 0 0 0.88 0 1 0 0 0.66 0 0 1 0 0.12 0 0 0 0.7 0"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="wordGlow" x="-20%" y="-30%" width="140%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="1 0 0 0 0.9 0 1 0 0 0.9 0 0 1 0 0.82 0 0 0 0.45 0"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1024" height="1024" fill="url(#backgroundGlow)"/>
  <circle cx="525" cy="414" r="360" fill="url(#goldHalo)"/>

  <g filter="url(#softGlow)">
    <path d="M265 506c97 42 255 35 380-22 75-34 131-80 166-133l20 31c-39 62-104 114-191 151-136 58-304 59-407 3z" fill="url(#silver)" opacity="0.92"/>
    <path d="M241 477c106 42 281 29 424-52 90-51 154-118 192-199l27 49c-47 87-125 158-232 210-153 74-329 78-435 25z" fill="url(#gold)"/>
    <path d="M794 284l95-95 4 97 82 16-107 57z" fill="url(#gold)"/>
    <path d="M856 195l23-73 22 73 71 23-71 22-22 72-23-72-72-22z" fill="#fff1a3"/>

    <g stroke="#6d4c0b" stroke-width="2" opacity="0.55">
      <rect x="360" y="338" width="72" height="132" fill="url(#gold)"/>
      <rect x="456" y="304" width="72" height="166" fill="url(#gold)"/>
      <rect x="552" y="256" width="72" height="214" fill="url(#gold)"/>
    </g>
    <path d="M309 517c94 53 272 57 430-5 77-31 139-73 182-126" fill="none" stroke="#cfd1d1" stroke-width="23" stroke-linecap="round" opacity="0.82"/>
    <path d="M270 500c118 52 315 40 482-48" fill="none" stroke="#f2c642" stroke-width="19" stroke-linecap="round"/>
  </g>

  <g filter="url(#wordGlow)">
    <text x="512" y="639" text-anchor="middle" font-family="Helvetica Neue, Arial, sans-serif" font-size="118" font-weight="700" letter-spacing="18" fill="url(#silver)">AFFAREM</text>
    <text x="512" y="716" text-anchor="middle" font-family="Helvetica Neue, Arial, sans-serif" font-size="31" font-weight="500" letter-spacing="12" fill="#f2cd57">INVEST. MANAGE. GROW.</text>
    <path d="M206 702h66M752 702h66" stroke="#d3a631" stroke-width="3" stroke-linecap="round"/>
  </g>
</svg>
