<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 200" width="500" height="200" fill="none">
  <!-- Decorative flourish on top left -->
  <path d="M 60 35 Q 75 25, 90 30 Q 105 35, 100 45" stroke="#8B5A3C" stroke-width="5" stroke-linecap="round" fill="none"/>

  <!-- Main Logo Group -->
  <g>
    <!-- Ölmez Text (larger) -->
    <g fill="#8B5A3C">
      <!-- Ö -->
      <ellipse cx="85" cy="90" rx="32" ry="42"/>
      <ellipse cx="85" cy="90" rx="20" ry="32" fill="white"/>
      <!-- Two dots above Ö -->
      <circle cx="65" cy="50" r="4.5"/>
      <circle cx="105" cy="50" r="4.5"/>

      <!-- l -->
      <rect x="140" y="50" width="9" height="80" rx="4.5"/>

      <!-- m -->
      <path d="M 170 130 L 170 60 Q 170 45, 187 45 Q 198 45, 203 55 L 203 130 M 203 55 Q 203 45, 220 45 Q 231 45, 236 55 L 236 130" stroke="#8B5A3C" stroke-width="9" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

      <!-- e -->
      <path d="M 275 130 L 275 60 Q 275 45, 292 45 Q 315 45, 315 65 L 280 65 Q 280 52, 292 52 Q 310 52, 310 70 L 280 70 Q 280 92, 298 102 Q 310 130, 325 130" stroke="#8B5A3C" stroke-width="9" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

      <!-- z -->
      <path d="M 345 45 L 385 45 L 355 125 L 385 125" stroke="#8B5A3C" stroke-width="9" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    </g>

    <!-- Franchise Systems text (smaller, below) -->
    <text x="85" y="175" font-family="Arial, sans-serif" font-size="24" font-weight="500" fill="#8B5A3C" letter-spacing="2">
      FRANCHISE SYSTEMS
    </text>
  </g>

  <!-- Decorative line -->
  <line x1="60" y1="140" x2="400" y2="140" stroke="#8B5A3C" stroke-width="1" opacity="0.3"/>
</svg>