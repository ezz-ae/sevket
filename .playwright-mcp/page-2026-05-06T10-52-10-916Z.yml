      - heading "The people system behind the room." [level=2] [ref=e54]
      - paragraph [ref=e55]: Ölmez now employs more than 2,700 people globally. Culture is not a slogan here. It is the discipline that lets a brand serve 405 meals per minute without looking or feeling chaotic.
